name: Release Helm Chart

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - '.github/workflows/helm-chart-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-chart:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/redis-navigator

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure GitHub Pages branch exists
        run: |
          should_initialize_pages=false

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            git fetch origin +gh-pages:refs/remotes/origin/gh-pages
            if ! git cat-file -e refs/remotes/origin/gh-pages:index.yaml 2>/dev/null; then
              should_initialize_pages=true
            fi
          else
            should_initialize_pages=true
          fi

          if [ "$should_initialize_pages" = "true" ]; then
            git switch --orphan gh-pages
            git rm -rf .
            printf '# RedisNavigator Helm chart repository\n' > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
            git push --force origin gh-pages
            git fetch origin +gh-pages:refs/remotes/origin/gh-pages
          fi

          git checkout -f "$GITHUB_SHA"

      - name: Publish chart to GitHub Pages
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: helm
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
