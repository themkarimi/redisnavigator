name: Release Helm Chart (OCI)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - '.github/workflows/helm-chart-release.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release-chart:
    name: Package and Push Helm Chart to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/redis-navigator

      - name: Package chart
        id: package
        run: |
          helm package helm/redis-navigator --destination /tmp/helm-packages
          CHART_TGZ=$(ls /tmp/helm-packages/*.tgz)
          echo "chart_tgz=${CHART_TGZ}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR
        run: |
          helm push "${{ steps.package.outputs.chart_tgz }}" \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts
