apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redis-navigator.fullname" . }}-backend
  labels:
    {{- include "redis-navigator.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "redis-navigator.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "redis-navigator.backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "redis-navigator.serviceAccountName" . }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "redis-navigator.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          env:
            - name: NODE_ENV
              value: {{ .Values.backend.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: FRONTEND_URL
              value: {{ .Values.backend.frontendUrl | quote }}
            # Secrets from the backend Secret
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis-navigator.backend.secretName" . }}
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis-navigator.backend.secretName" . }}
                  key: JWT_REFRESH_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis-navigator.backend.secretName" . }}
                  key: ENCRYPTION_KEY
            - name: REDIS_BLACKLIST_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis-navigator.backend.secretName" . }}
                  key: REDIS_BLACKLIST_URL
            - name: REDIS_BLACKLIST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis-navigator.backend.secretName" . }}
                  key: REDIS_BLACKLIST_PASSWORD
            # External PostgreSQL DSN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis-navigator.database.secretName" . }}
                  key: {{ include "redis-navigator.database.secretKey" . }}
            # OIDC (optional)
            - name: OIDC_ENABLED
              value: {{ .Values.oidc.enabled | quote }}
            {{- if .Values.oidc.enabled }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: OIDC_REDIRECT_URI
              value: {{ .Values.oidc.redirectUri | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis-navigator.oidc.secretName" . }}
                  key: {{ include "redis-navigator.oidc.secretKey" . }}
            {{- end }}
            {{- if .Values.configFile.enabled }}
            - name: CONFIG_FILE
              value: /app/config.yaml
            {{- end }}
            {{- if .Values.disabledCommands }}
            - name: DISABLED_COMMANDS
              value: {{ .Values.disabledCommands | quote }}
            {{- end }}
          {{- if .Values.configFile.enabled }}
          volumeMounts:
            - name: config-file
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.configFile.enabled }}
      volumes:
        - name: config-file
          configMap:
            name: {{ include "redis-navigator.fullname" . }}-config
      {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
