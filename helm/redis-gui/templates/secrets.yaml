{{/*
Secret that holds sensitive backend environment variables.
Skipped when backend.existingSecret is set (user manages it externally).
*/}}
{{- if not .Values.backend.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "redis-gui.fullname" . }}-backend
  labels:
    {{- include "redis-gui.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_ACCESS_SECRET: {{ .Values.backend.secret.jwtAccessSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.backend.secret.jwtRefreshSecret | quote }}
  ENCRYPTION_KEY: {{ .Values.backend.secret.encryptionKey | quote }}
  REDIS_BLACKLIST_URL: {{ .Values.redisBlacklist.url | quote }}
  REDIS_BLACKLIST_PASSWORD: {{ .Values.redisBlacklist.password | quote }}
  {{- if .Values.oidc.enabled }}
  {{- if not .Values.oidc.existingSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
  {{- end }}
{{- end }}

{{/*
Secret that holds the external PostgreSQL DSN.
Skipped when externalDatabase.existingSecret is set.
*/}}
{{- if not .Values.externalDatabase.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "redis-gui.fullname" . }}-database
  labels:
    {{- include "redis-gui.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.externalDatabase.user .Values.externalDatabase.password .Values.externalDatabase.host (int .Values.externalDatabase.port) .Values.externalDatabase.name | quote }}
{{- end }}
